<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>황은화 의원 의정지원 계획</title>
<style>
:root{--pri:#1B3A5C;--sec:#2E75B6;--acc:#4472C4;--lbg:#E8EFF7;--lbg2:#F2F7FC;--dk:#1A1A1A;--gr:#666;--wh:#fff;--bd:#D0D8E0;--green:#0F6E56;--green-bg:#E1F5EE;--amber:#854F0B;--amber-bg:#FAEEDA;--red:#A32D2D;--red-bg:#FCEBEB;--purple:#534AB7;--purple-bg:#EEEDFE}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Malgun Gothic','맑은 고딕','Segoe UI',sans-serif;background:#F4F6F8;color:var(--dk);line-height:1.6}
.top-bar{background:var(--pri);color:var(--wh);padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between}
.top-bar h1{font-size:16px;font-weight:500}
.top-bar .period{font-size:12px;opacity:0.7;font-weight:400}
.top-right{display:flex;align-items:center;gap:12px}
.edit-toggle{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--wh);cursor:pointer}
.edit-toggle input{display:none}
.toggle-track{width:40px;height:22px;background:rgba(255,255,255,.3);border-radius:11px;position:relative;transition:.3s}
.toggle-track::after{content:'';position:absolute;left:2px;top:2px;width:18px;height:18px;background:var(--wh);border-radius:50%;transition:.3s}
.edit-toggle input:checked+.toggle-track{background:#4CAF50}
.edit-toggle input:checked+.toggle-track::after{left:20px}
.reset-btn{background:rgba(255,255,255,.15);color:var(--wh);border:1px solid rgba(255,255,255,.3);padding:4px 12px;border-radius:6px;font-size:12px;cursor:pointer;display:none}
.reset-btn:hover{background:rgba(255,255,255,.25)}
body.edit-mode .reset-btn{display:inline-block}
.header{background:var(--wh);border-bottom:1px solid var(--bd);padding:20px 32px;display:flex;align-items:center;gap:16px}
.avatar{width:52px;height:52px;border-radius:50%;background:var(--sec);color:var(--wh);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:600;flex-shrink:0}
.header-info h2{font-size:20px;font-weight:600;color:var(--pri)}
.header-info p{font-size:13px;color:var(--gr);margin-top:2px}
.tabs{background:var(--wh);border-bottom:2px solid #E0E4E8;padding:0 32px;display:flex;gap:0;overflow-x:auto}
.tab{padding:12px 20px;font-size:14px;font-weight:500;color:var(--gr);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .2s}
.tab:hover{color:var(--sec)}
.tab.active{color:var(--sec);border-bottom-color:var(--sec)}
.content{max-width:960px;margin:0 auto;padding:24px 32px}
.panel{display:none}
.panel.active{display:block}
.metric-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.metric{background:var(--wh);border-radius:10px;padding:16px 20px;border:1px solid var(--bd)}
.metric-label{font-size:12px;color:var(--gr);margin-bottom:4px}
.metric-val{font-size:24px;font-weight:700;color:var(--pri)}
.metric-val span{font-size:14px;font-weight:400;color:var(--gr)}
.card{background:var(--wh);border-radius:10px;border:1px solid var(--bd);padding:20px;margin-bottom:12px;position:relative;transition:border-color .2s}
.card-title{font-size:15px;font-weight:600;color:var(--pri);margin-bottom:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.card-body{font-size:13px;color:#444;line-height:1.7}
.section-title{font-size:17px;font-weight:600;color:var(--pri);margin:24px 0 12px;padding-bottom:8px;border-bottom:2px solid var(--sec)}
.section-title:first-child{margin-top:0}
.sub-title{font-size:15px;font-weight:600;color:var(--sec);margin:16px 0 8px}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:12px;cursor:pointer;user-select:none;transition:all .15s;flex-shrink:0}
.badge-plan{background:#E8EFF7;color:var(--acc)}
.badge-prog{background:var(--amber-bg);color:var(--amber)}
.badge-done{background:var(--green-bg);color:var(--green)}
.badge:hover{transform:scale(1.05);box-shadow:0 1px 4px rgba(0,0,0,.12)}
.tbl{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
.tbl th{background:var(--pri);color:var(--wh);padding:10px 12px;text-align:left;font-weight:500}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--bd)}
.tbl tr:nth-child(even){background:var(--lbg2)}
.tbl tr:hover{background:var(--lbg)}
.tbl .divider-row td{background:var(--lbg);text-align:center;font-weight:600;color:var(--sec);padding:8px}
ul.bl{list-style:none;padding-left:0;margin:4px 0}
ul.bl li{padding:3px 0 3px 18px;position:relative;font-size:13px;color:#444}
ul.bl li::before{content:'●';position:absolute;left:0;color:var(--acc);font-size:8px;top:7px}
.prof-tbl{width:100%;border-collapse:collapse;margin-top:8px}
.prof-tbl th{background:var(--pri);color:var(--wh);padding:10px 14px;text-align:center;font-weight:500;width:140px;font-size:13px}
.prof-tbl td{padding:10px 14px;border:1px solid var(--bd);font-size:13px}
.prog-bar{height:14px;background:#E0E4E8;border-radius:7px;overflow:hidden;margin:8px 0 4px}
.prog-fill{height:100%;background:var(--sec);border-radius:7px;transition:width .5s}
.prog-text{font-size:12px;color:var(--gr)}
.next-alert{background:linear-gradient(135deg,var(--lbg),var(--lbg2));border:1px solid var(--acc);border-radius:10px;padding:14px 20px;margin-bottom:20px;display:flex;align-items:center;gap:12px}
.next-alert .text{font-size:13px;color:var(--pri)}
.next-alert .text strong{color:var(--sec)}

/* Edit mode */
.grip{display:none;color:var(--gr);cursor:grab;font-size:18px;padding:0 4px;flex-shrink:0;user-select:none}
.grip:active{cursor:grabbing}
body.edit-mode .grip{display:inline-block}
.del-btn{display:none;position:absolute;top:8px;right:8px;background:var(--red-bg);color:var(--red);border:none;border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:14px;line-height:28px;text-align:center}
.del-btn:hover{background:var(--red);color:var(--wh)}
body.edit-mode .del-btn{display:block}
.add-btn{display:none;border:2px dashed var(--acc);background:transparent;color:var(--acc);padding:12px;border-radius:10px;width:100%;cursor:pointer;font-size:14px;font-weight:600;margin:8px 0 16px;transition:all .2s}
.add-btn:hover{background:var(--lbg);border-color:var(--sec)}
body.edit-mode .add-btn{display:block}
body.edit-mode .card{cursor:default}
body.edit-mode .card.dragging{opacity:.4;border:2px dashed var(--acc)}
body.edit-mode .card.drag-over{border-top:3px solid var(--sec)}
[contenteditable=true]{outline:none;border-bottom:1px dashed var(--acc);padding:0 2px;min-width:20px}
[contenteditable=true]:focus{background:var(--lbg2);border-bottom-color:var(--sec)}

/* Sched table edit */
body.edit-mode .tbl td[contenteditable]{border-bottom:1px dashed var(--acc)}
.tbl .add-row-btn{display:none;background:transparent;border:2px dashed var(--acc);color:var(--acc);padding:8px;width:100%;cursor:pointer;font-size:13px;font-weight:600}
body.edit-mode .tbl .add-row-btn{display:block}
.tbl .del-cell{display:none;color:var(--red);cursor:pointer;font-size:14px;text-align:center}
body.edit-mode .tbl .del-cell{display:table-cell}
.tbl .grip-cell{display:none;cursor:grab;color:var(--gr);font-size:14px;text-align:center}
body.edit-mode .tbl .grip-cell{display:table-cell}

/* Calendar */
.cal-wrap{margin-bottom:24px}
.cal-nav{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:12px}
.cal-nav button{background:var(--wh);border:1px solid var(--bd);border-radius:6px;width:32px;height:32px;cursor:pointer;font-size:16px;color:var(--pri);display:flex;align-items:center;justify-content:center}
.cal-nav button:hover{background:var(--lbg)}
.cal-nav .cal-month{font-size:16px;font-weight:600;color:var(--pri);min-width:120px;text-align:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);border:1px solid var(--bd);border-radius:10px;overflow:hidden;background:var(--wh)}
.cal-hdr{background:var(--pri);color:var(--wh);text-align:center;font-size:12px;font-weight:500;padding:8px 4px}
.cal-hdr.sun{color:#FFA8A8}.cal-hdr.sat{color:#A8D1FF}
.cal-cell{min-height:80px;border:1px solid #EEE;padding:4px;vertical-align:top;position:relative;font-size:12px}
.cal-cell.other{background:#FAFAFA;color:#CCC}
.cal-cell.today{background:#FFFDE7}
.cal-day{font-weight:600;margin-bottom:2px;font-size:12px;color:var(--dk)}
.cal-cell.other .cal-day{color:#CCC}
.cal-cell.sun .cal-day{color:#E53935}
.cal-cell.sat .cal-day{color:var(--sec)}
.cal-evt{display:block;background:var(--sec);color:var(--wh);font-size:10px;padding:1px 4px;border-radius:3px;margin-bottom:2px;overflow:hidden;cursor:default;line-height:1.4;word-break:break-all}
.cal-evt.st0{background:var(--acc)}
.cal-evt.st1{background:#D4A017}
.cal-evt.st2{background:var(--green)}
.cal-evt:hover{opacity:.85}
.cal-more{font-size:10px;color:var(--sec);cursor:pointer;font-weight:500}
.cal-legend{display:flex;gap:16px;justify-content:center;margin-top:8px;font-size:11px;color:var(--gr)}
.cal-legend span{display:flex;align-items:center;gap:4px}
.cal-legend i{width:10px;height:10px;border-radius:2px;display:inline-block}
.cal-cell.in-session{background:#EBF3FB!important}
.cal-evt.ple{background:#1B3A5C}.cal-evt.com{background:#2E75B6}.cal-evt.aud{background:#D35400}.cal-evt.bud{background:#8E44AD}
.cal-evt.prS{background:#009688;opacity:.8}.cal-evt.prB{background:#E67E22;opacity:.8}.cal-evt.prQ{background:#3F51B5;opacity:.8}.cal-evt.prA{background:#C0392B;opacity:.8}.cal-evt.prU{background:#9B59B6;opacity:.8}
.cal-evt.hol{background:#E53935;opacity:.7}
.cal-bar{height:3px;border-radius:1px;margin:1px 0;padding:0!important}
.cal-legend2{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:4px;font-size:11px;color:var(--gr)}
.cal-legend2 span{display:flex;align-items:center;gap:4px}
.cal-legend2 i{width:10px;height:10px;border-radius:2px;display:inline-block}
@media(max-width:768px){.metric-row{grid-template-columns:repeat(2,1fr)}.content{padding:16px}.tabs{padding:0 16px}.header{padding:16px}.cal-cell{min-height:60px}}
</style>
</head>
<body>

<div class="top-bar">
  <h1>📋 제12대 경기도의회 전반기 의정지원 계획 <span class="period">2026.7 ~ 2028.6</span></h1>

</div>

<script>

let editMode=false;

const DEFAULT={
activities:[
  {id:'a1',year:1,cat:'bill',title:'다문화 관광자원 육성 및 지원 조례',date:'2026.11월 제394회 정례회',status:0,body:'다문화 특화 관광자원 발굴·육성, 관광특구 지정 근거, 다국어 관광 안내 인프라, 경기관광공사·시군 협력체계\n연계: 경기 로컬관광(21억), 대표 지역축제(35억), 경기컬처패스(25억)',details:'안산 다문화마을특구 현황 및 관광자원 실태조사|타 시도 다문화 관광 관련 조례 비교분석|안산 다문화 주민·단체 간담회 개최 (10월)|경기관광공사·안산시 협의 (10월)|입법조사처 조례안 검토 의뢰 (10월 중순)'},
  {id:'a2',year:1,cat:'amend',title:'관광진흥 조례 일부개정',date:'2027.2월',status:0,body:'관광특구 지정 요건에 다문화 특화 관광지구 유형 추가|다국어 관광 안내 시스템 구축 근거 강화|로컬관광 콘텐츠에 다문화 체험형 관광상품 포함'},

  {id:'a8',year:1,cat:'budget',title:'2027년도 예산심의',date:'2026.12월 제394회',status:0,body:'안산 다문화 관광콘텐츠 개발 신규 예산 확보|대부도·시화호 관광자원 개발사업 예산|무장애 관광지 공간환경 개선 안산 포함|2027 전국체전 안산 경기장 개보수 예산 점검|안산 국제거리극축제 지원 증액'},
  {id:'a9',year:2,cat:'bill',title:'해양관광 진흥 및 지원 조례',date:'2027.11월 정례회',status:0,body:'대부도·시화호 해양관광 체계적 개발, 해양레저·생태관광 프로그램, 갯길 활성화, 해양관광 인력양성\n연계: 경기둘레길 조성·운영(9억), 관광자원 개발(50개 세부사업), 웰니스 관광(4억)'},
  {id:'a10',year:2,cat:'amend',title:'문화예술교육 조례 일부개정',date:'2027.9월',status:0,body:'다문화 아동·청소년 대상 문화예술교육 특화|다문화 예술인 교육 참여 확대'},
  {id:'a11',year:2,cat:'amend',title:'다문화 관광자원 조례 시행 보완 개정',date:'2028.2월',status:0,body:'1차년도 조례 시행 후 현장 의견 반영|관광 품질인증 제도 도입'},

let data;
function loadData(){try{const s=localStorage.getItem(STORAGE);data=s?JSON.parse(s):JSON.parse(JSON.stringify(DEFAULT))}catch(e){data=JSON.parse(JSON.stringify(DEFAULT))}}
function saveData(){localStorage.setItem(STORAGE,JSON.stringify(data))}
function resetAll(){if(confirm('모든 편집 내용을 초기 상태로 되돌리시겠습니까?')){localStorage.removeItem(STORAGE);loadData();renderAll()}}

let nextId=1000;
function genId(){return 'n'+(nextId++)}

/* ===== TAB / EDIT MODE ===== */
function showTab(n){document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===n));document.querySelectorAll('.panel').forEach((p,i)=>p.classList.toggle('active',i===n))}
function toggleEditMode(){editMode=document.getElementById('editToggle').checked;document.body.classList.toggle('edit-mode',editMode);renderAll()}

/* ===== STATUS TOGGLE ===== */
function cycleStatus(arr,idx){arr[idx].status=(arr[idx].status+1)%3;saveData();renderAll()}

/* ===== DRAG & DROP (cards) ===== */
let dragSrc=null,dragArr=null;
function dragStart(e,arr,idx){dragSrc=idx;dragArr=arr;e.target.closest('.card').classList.add('dragging')}
function dragEnd(e){document.querySelectorAll('.card').forEach(c=>{c.classList.remove('dragging','drag-over')})}
function dragOver(e){e.preventDefault();e.target.closest('.card')?.classList.add('drag-over')}
function dragLeave(e){e.target.closest('.card')?.classList.remove('drag-over')}
function drop(e,arr,idx){e.preventDefault();if(dragArr!==arr||dragSrc===idx)return;const item=arr.splice(dragSrc,1)[0];arr.splice(idx,0,item);saveData();renderAll()}

/* ===== DRAG & DROP (table rows) ===== */
let dragRowSrc=null;
function rowDragStart(e,idx){dragRowSrc=idx;e.target.closest('tr').style.opacity='.4'}
function rowDragEnd(e){e.target.closest('tr').style.opacity='1'}
function rowDragOver(e){e.preventDefault()}
function rowDrop(e,idx){e.preventDefault();if(dragRowSrc===null||dragRowSrc===idx)return;const item=data.schedule.splice(dragRowSrc,1)[0];data.schedule.splice(idx,0,item);dragRowSrc=null;saveData();renderAll()}

/* ===== INLINE EDIT ===== */
function makeEditable(text,onSave){const el=document.createElement('span');el.textContent=text;if(editMode){el.contentEditable='true';el.addEventListener('blur',()=>{onSave(el.textContent.trim());saveData()})}return el}

/* ===== DELETE ===== */
function deleteItem(arr,idx){if(confirm('이 항목을 삭제하시겠습니까?')){arr.splice(idx,1);saveData();renderAll()}}

/* ===== ADD ===== */
function addActivity(year){data.activities.push({id:genId(),year,cat:'etc',title:'새 항목',date:'시기 입력',status:0,body:'내용 입력'});saveData();renderAll();showTab(1)}

function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

    <div class="card"><div class="card-title">📋 공약이행 현황</div><div class="card-body"><div class="prog-bar"><div class="prog-fill" style="width:${ppct}%"></div></div><div class="prog-text">${pledges.t}개 핵심공약 중 ${pledges.d}개 완료 (${ppct}%)</div></div></div>

function renderCalendar(){
  const first=new Date(calYear,calMonth-1,1);
  const startDow=first.getDay();
  const dim=new Date(calYear,calMonth,0).getDate();
  const prevDays=new Date(calYear,calMonth-1,0).getDate();
  const today=new Date();const tY=today.getFullYear(),tM=today.getMonth()+1,tD=today.getDate();
  const mStart=ymd(calYear,calMonth,1),mEnd=ymd(calYear,calMonth,dim);

  /* 이벤트 수집 */
  const evts={};
  const add=(d,text,cls,pri)=>{if(!evts[d])evts[d]=[];evts[d].push({text,cls,pri:pri||5})};

  /* 오버레이 이벤트 */
  OVERLAY.forEach(([s,e,label,cls,pri])=>{
    if(e<mStart||s>mEnd)return;
    const ds=s<mStart?1:(s%100),de=e>mEnd?dim:((Math.floor(e/100)%100===calMonth)?e%100:dim);
    for(let d=ds;d<=de;d++) add(d, d===ds?label:'', cls, pri);
  });

  /* 의원 일정 이벤트 */
  data.schedule.forEach((s,i)=>{
    if(s.cat==='__divider__')return;
    const pd=parseSchedDate(s.date);
    if(!pd||pd.y!==calYear||pd.m!==calMonth)return;
    add(pd.d||1, s.cat+': '+s.text, 'st'+s.status, 5);
  });

  /* 회기 배경 체크 */
  function inSess(d){const dn=ymd(calYear,calMonth,d);return SESS.some(([s,e])=>dn>=s&&dn<=e)}

  /* 렌더링 */
  let html='<div class="cal-wrap"><div class="cal-nav">';
  html+='<button onclick="calPrev()">◀</button>';
  html+=`<span class="cal-month">${calYear}년 ${calMonth}월</span>`;
  html+='<button onclick="calNext()">▶</button></div>';
  html+='<div class="cal-grid">';
  ['일','월','화','수','목','금','토'].forEach((dn,di)=>html+=`<div class="cal-hdr${di===0?' sun':''}${di===6?' sat':''}">${dn}</div>`);

  for(let i=startDow-1;i>=0;i--) html+=`<div class="cal-cell other"><div class="cal-day">${prevDays-i}</div></div>`;

  for(let d=1;d<=dim;d++){
    const dow=(startDow+d-1)%7;
    let cls='cal-cell';
    if(calYear===tY&&calMonth===tM&&d===tD) cls+=' today';
    if(dow===0) cls+=' sun';
    if(dow===6) cls+=' sat';
    if(inSess(d)) cls+=' in-session';
    html+=`<div class="${cls}"><div class="cal-day">${d}</div>`;
    if(evts[d]){
      const sorted=evts[d].sort((a,b)=>a.pri-b.pri);
      const show=sorted.slice(0,4);
      show.forEach(ev=>{
        if(ev.text){
          html+=`<div class="cal-evt ${ev.cls}" title="${escHtml(ev.text)}">${escHtml(ev.text)}</div>`;
        } else {
          html+=`<div class="cal-evt ${ev.cls} cal-bar"></div>`;
        }
      });
      if(sorted.length>4) html+=`<div class="cal-more">+${sorted.length-4}</div>`;
    }
    html+='</div>';
  }

  const total=startDow+dim,remain=total%7===0?0:7-total%7;
  for(let i=1;i<=remain;i++) html+=`<div class="cal-cell other"><div class="cal-day">${i}</div></div>`;
  html+='</div>';

  html+=`<div class="cal-legend"><span><i style="background:#1B3A5C"></i>본회의</span><span><i style="background:#2E75B6"></i>상임위</span><span><i style="background:#D35400"></i>감사</span><span><i style="background:#8E44AD"></i>예결위</span><span><i style="background:#E53935"></i>공휴일</span></div>`;
  html+=`<div class="cal-legend2"><span><i style="background:#009688"></i>발언준비</span><span><i style="background:#E67E22"></i>조례준비</span><span><i style="background:#3F51B5"></i>질의준비</span><span><i style="background:#C0392B"></i>감사준비</span><span><i style="background:#9B59B6"></i>예산준비</span></div>`;
  html+='</div>';
  return html;
}

/* ===== RENDER: SCHEDULE ===== */
function renderSchedule(){
  const p=document.getElementById('panel-3');
  let rows='';
  data.schedule.forEach((s,i)=>{
    if(s.cat==='__divider__'){
      rows+=`<tr class="divider-row"><td colspan="${editMode?'7':'5'}">${escHtml(s.text)}</td></tr>`;
      return;
    }
    rows+=`<tr draggable="${editMode}" ondragstart="rowDragStart(event,${i})" ondragend="rowDragEnd(event)" ondragover="rowDragOver(event)" ondrop="rowDrop(event,${i})">
      ${editMode?'<td class="grip-cell" style="display:table-cell">⠿</td>':''}
      <td ${editMode?'contenteditable="true" onblur="data.schedule['+i+'].date=this.textContent.trim();saveData();renderSchedule()"':''}>${escHtml(s.date)}</td>
      <td ${editMode?'contenteditable="true" onblur="data.schedule['+i+'].session=this.textContent.trim();saveData()"':''}>${escHtml(s.session)}</td>
      <td ${editMode?'contenteditable="true" onblur="data.schedule['+i+'].cat=this.textContent.trim();saveData()"':''}>${escHtml(s.cat)}</td>
      <td ${editMode?'contenteditable="true" onblur="data.schedule['+i+'].text=this.textContent.trim();saveData()"':''}>${escHtml(s.text)}</td>
      <td><span class="badge ${statusClass[s.status]}" onclick="cycleStatus(data.schedule,${i})">${statusCycle[s.status]}</span></td>
      ${editMode?'<td class="del-cell" style="display:table-cell" onclick="deleteItem(data.schedule,'+i+')">🗑</td>':''}
    </tr>`;
  });
  p.innerHTML=`<div class="section-title">📅 전반기 의정활동 일정표</div>
    ${renderCalendar()}
    <div class="section-title" style="margin-top:32px">📋 일정 상세 목록</div>
    <table class="tbl"><thead><tr>${editMode?'<th style="width:40px"></th>':''}
    <th style="width:80px">시기</th><th style="width:80px">회기</th><th style="width:110px">구분</th><th>주요 내용</th><th style="width:60px">상태</th>${editMode?'<th style="width:40px"></th>':''}</tr></thead>
    <tbody>${rows}</tbody></table>
    <button class="add-btn" onclick="addSchedule()">＋ 일정 추가</button>`;
}
